name: documentos-seia-notebook

services:
  notebooklm-api:
    build:
      context: ./repos/notebooklm
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    shm_size: 2gb
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  documentos-seia-api:
    build:
      context: ./repos/documentos-seia
      dockerfile: Dockerfile
    depends_on:
      notebooklm-api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NOTEBOOK_API_BASE_URL: http://notebooklm-api:8001
      API_OUTPUT_ROOT: /data/downloads
    restart: unless-stopped
    ports:
      - "127.0.0.1:8020:8000"
    volumes:
      - /var/lib/documentos-seia-notebook/downloads:/data/downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

networks:
  internal:
    driver: bridge
