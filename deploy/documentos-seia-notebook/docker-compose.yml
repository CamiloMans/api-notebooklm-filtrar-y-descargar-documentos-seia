name: documentos-seia-notebook

services:
  documentos-seia-api:
    build:
      context: ./repos/documentos-seia
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      API_OUTPUT_ROOT: /data/downloads
    restart: unless-stopped
    ports:
      - "127.0.0.1:8020:8000"
    volumes:
      - /var/lib/documentos-seia-notebook/downloads:/data/downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
