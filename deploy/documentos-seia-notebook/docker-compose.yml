name: documentos-seia-notebook

services:
  documentos-seia-api:
    image: documentos-seia-api:${IMAGE_TAG:-dev}
    build:
      context: ./repos/documentos-seia
      dockerfile: Dockerfile
    env_file:
      - ${DOCUMENTOS_SEIA_ENV_FILE:-.env}
    environment:
      API_OUTPUT_ROOT: /data/downloads
      RUN_JOBS_IN_WEB: "false"
      SEIA_DOWNLOAD_MAX_WORKERS: "1"
      SEIA_DOWNLOAD_RETRY_ATTEMPTS: "20"
      SEIA_DOWNLOAD_READ_TIMEOUT_SEC: "600"
      SEIA_DOWNLOAD_RETRY_BASE_SEC: "8"
      SEIA_DOWNLOAD_FAILED_RETRY_PASSES: "1"
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.50
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8020:8000"
    volumes:
      - /var/lib/documentos-seia-notebook/downloads:/data/downloads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  documentos-seia-worker:
    image: documentos-seia-api:${IMAGE_TAG:-dev}
    command: ["python", "worker_app.py"]
    profiles: ["worker"]
    env_file:
      - ${DOCUMENTOS_SEIA_ENV_FILE:-.env}
    environment:
      API_OUTPUT_ROOT: /data/downloads
      RUN_JOBS_IN_WEB: "false"
      MAX_CONCURRENT_JOBS: "1"
      SEIA_DOWNLOAD_MAX_WORKERS: "1"
      SEIA_DOWNLOAD_RETRY_ATTEMPTS: "20"
      SEIA_DOWNLOAD_READ_TIMEOUT_SEC: "600"
      SEIA_DOWNLOAD_RETRY_BASE_SEC: "8"
      SEIA_DOWNLOAD_FAILED_RETRY_PASSES: "1"
    restart: unless-stopped
    stop_grace_period: 15m
    mem_limit: 768m
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    healthcheck:
      disable: true
    volumes:
      - /var/lib/documentos-seia-notebook/downloads:/data/downloads
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
